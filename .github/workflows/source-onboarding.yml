name: Source Onboarding

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Candidate subscription/raw URL"
        required: true
      source_label:
        description: "Human-readable label"
        required: true
        default: "Candidate source"
      append_candidate:
        description: "Append to registry/candidate_sources.json in the workflow workspace"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

jobs:
  evaluate-source:
    name: Evaluate source candidate
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Evaluate candidate source
        run: |
          set -euxo pipefail
          EXTRA=""
          if [ "${{ github.event.inputs.append_candidate }}" = "true" ]; then
            EXTRA="--append-candidate"
          fi
          python -m v2ray_finder.source_onboarding \
            --url "${{ github.event.inputs.source_url }}" \
            --label "${{ github.event.inputs.source_label }}" \
            --tcp-sample-size 50 \
            --json \
            $EXTRA | tee source-onboarding-report.json

      - name: Upload onboarding report
        uses: actions/upload-artifact@v4
        with:
          name: source-onboarding-report
          path: |
            source-onboarding-report.json
            registry/candidate_sources.json
          if-no-files-found: ignore
