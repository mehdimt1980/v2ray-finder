name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "android_app/**"
      - "registry/**"
      - "scripts/**"
      - ".github/workflows/android-apk.yml"
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python for build scripts
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Gradle 8.9
        run: |
          set -euxo pipefail
          curl -sSLo gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP/gradle"
          echo "$RUNNER_TEMP/gradle/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-native-kotlin-${{ runner.os }}-${{ hashFiles('android_app/**/*.gradle') }}
          restore-keys: |
            gradle-native-kotlin-${{ runner.os }}-

      - name: Bundle xray binary for Android native runtime
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          python scripts/prepare_android_xray_asset.py
          test -s android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          ls -lh android_app/app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle -p android_app :app:assembleDebug --stacktrace 2>&1 | tee android-gradle-build.log

      - name: Verify APK contains native runtime payloads
        run: |
          APK=$(ls -1 android_app/app/build/outputs/apk/debug/*.apk | head -n 1)
          python - <<'PY'
          import zipfile
          from pathlib import Path

          apk = Path(next(Path('android_app/app/build/outputs/apk/debug').glob('*.apk')))
          with zipfile.ZipFile(apk) as zf:
              names = sorted(zf.namelist())
          Path('apk-files.txt').write_text('\n'.join(names) + '\n', encoding='utf-8')
          required = [
              'assets/sources.json',
              'lib/arm64-v8a/libxray.so',
          ]
          missing = [name for name in required if name not in names]
          if missing:
              raise SystemExit('APK is missing required native payload files: ' + ', '.join(missing))
          if any('chaquopy' in name.lower() for name in names):
              raise SystemExit('APK still contains Chaquopy payload files')
          print('APK file count:', len(names))
          print('Native payload verification passed')
          PY

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-failure-logs
          path: |
            android-gradle-build.log
            apk-files.txt
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-finder-native-debug-apk
          path: android_app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
