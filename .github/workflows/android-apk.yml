name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "android_app/**"
      - "v2ray_finder/**"
      - ".github/workflows/android-apk.yml"
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Expose python3.11 command
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/python-bin"
          ln -sf "$(command -v python)" "$RUNNER_TEMP/python-bin/python3.11"
          echo "$RUNNER_TEMP/python-bin" >> "$GITHUB_PATH"
          python --version
          "$RUNNER_TEMP/python-bin/python3.11" --version

      - name: Set up Gradle 8.9
        run: |
          set -euxo pipefail
          curl -sSLo gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP/gradle"
          echo "$RUNNER_TEMP/gradle/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-chaquopy-${{ runner.os }}-${{ hashFiles('android_app/**/*.gradle') }}
          restore-keys: |
            gradle-chaquopy-${{ runner.os }}-

      - name: Stage Python package for Chaquopy
        run: |
          rm -rf android_app/app/src/main/python/v2ray_finder
          cp -R v2ray_finder android_app/app/src/main/python/v2ray_finder
          find android_app/app/src/main/python -type d -name __pycache__ -prune -exec rm -rf {} +
          python3.11 - <<'PY'
          from pathlib import Path
          root = Path('android_app/app/src/main/python')
          required = [root / 'android_bridge.py', root / 'v2ray_finder/__init__.py', root / 'v2ray_finder/pipeline.py']
          missing = [str(p) for p in required if not p.exists()]
          if missing:
              raise SystemExit('Missing Python files for Android: ' + ', '.join(missing))
          files = sorted(str(p.relative_to(root)) for p in root.rglob('*.py'))
          print('Python files staged for Chaquopy:', len(files))
          print('\n'.join(files[:80]))
          PY

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle -p android_app :app:assembleDebug --stacktrace 2>&1 | tee android-gradle-build.log

      - name: Verify APK contains Chaquopy payload
        run: |
          APK=$(ls -1 android_app/app/build/outputs/apk/debug/*.apk | head -n 1)
          python3.11 - <<'PY'
          import io
          import zipfile
          from pathlib import Path

          apk = Path(next(Path('android_app/app/build/outputs/apk/debug').glob('*.apk')))
          with zipfile.ZipFile(apk) as zf:
              names = sorted(zf.namelist())
              Path('apk-files.txt').write_text('\n'.join(names) + '\n', encoding='utf-8')
              chaquopy_files = [n for n in names if 'chaquopy' in n.lower()]
              print('APK file count:', len(names))
              print('Chaquopy top-level files:', len(chaquopy_files))
              print('\n'.join(chaquopy_files[:80]))
              if not chaquopy_files:
                  raise SystemExit('APK does not contain Chaquopy files')

              found_python = False
              for name in names:
                  if name.endswith('.zip') and 'chaquopy' in name.lower():
                      data = zf.read(name)
                      try:
                          with zipfile.ZipFile(io.BytesIO(data)) as inner:
                              inner_names = sorted(inner.namelist())
                              if any('android_bridge' in x or 'v2ray_finder' in x for x in inner_names):
                                  found_python = True
                                  Path('chaquopy-python-files.txt').write_text('\n'.join(inner_names) + '\n', encoding='utf-8')
                                  print('Found Python app code in', name)
                                  print('\n'.join([x for x in inner_names if 'android_bridge' in x or 'v2ray_finder' in x][:80]))
                      except zipfile.BadZipFile:
                          pass
              if not found_python:
                  raise SystemExit('Could not find android_bridge/v2ray_finder inside Chaquopy payload')
          PY

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-failure-logs
          path: |
            android-gradle-build.log
            apk-files.txt
            chaquopy-python-files.txt
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-finder-chaquopy-debug-apk
          path: android_app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
