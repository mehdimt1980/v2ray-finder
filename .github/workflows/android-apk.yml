name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "main.py"
      - "buildozer.spec"
      - "src/**"
      - ".github/workflows/android-apk.yml"
  push:
    branches:
      - feature/android-kivy-ui

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libltdl-dev \
            libssl-dev \
            libtool \
            openjdk-17-jdk \
            pkg-config \
            python3-pip \
            python3-setuptools \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install "cython<3.0" buildozer
          buildozer --version
          python -m pip freeze | grep -E "buildozer|Cython|python-for-android" || true

      - name: Cache Gradle only
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare app sources
        run: |
          rm -rf v2ray_finder
          cp -R src/v2ray_finder ./v2ray_finder
          find v2ray_finder -type d -name __pycache__ -prune -exec rm -rf {} +
          python - <<'PY'
          from pathlib import Path
          required = [Path('main.py'), Path('v2ray_finder/__init__.py'), Path('v2ray_finder/pipeline.py')]
          missing = [str(p) for p in required if not p.exists()]
          if missing:
              raise SystemExit('Missing staged files: ' + ', '.join(missing))
          files = sorted(str(p) for p in Path('v2ray_finder').rglob('*.py'))
          print('Android staged package files:', len(files))
          print('\n'.join(files[:20]))
          PY

      - name: Clean stale Buildozer state
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer/android/platform/build-*

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-build.log

      - name: Verify APK contains app package
        run: |
          APK=$(ls -1 bin/*.apk | head -n 1)
          python - <<'PY'
          import io
          import tarfile
          import zipfile
          from pathlib import Path

          apk = Path(next(Path('bin').glob('*.apk')))
          with zipfile.ZipFile(apk) as zf:
              private = zf.read('assets/private.tar')
          with tarfile.open(fileobj=io.BytesIO(private), mode='r:*') as tf:
              names = sorted(m.name.lstrip('./') for m in tf.getmembers())
          Path('private-files.txt').write_text('\n'.join(names) + '\n', encoding='utf-8')
          required = {'main.pyc', 'v2ray_finder/__init__.pyc', 'v2ray_finder/pipeline.pyc'}
          missing = sorted(required - set(names))
          print('APK private.tar file count:', len(names))
          print('\n'.join(names[:80]))
          if missing:
              raise SystemExit('APK is missing required packaged files: ' + ', '.join(missing))
          PY

      - name: Upload Buildozer logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-failure-logs
          path: |
            buildozer-build.log
            private-files.txt
            .buildozer/**/*.log
            .buildozer/android/platform/**/*.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-finder-debug-apk
          path: bin/*.apk
          if-no-files-found: error
