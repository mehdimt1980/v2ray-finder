name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "android_app/**"
      - "registry/**"
      - ".github/workflows/android-apk.yml"
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        run: |
          set -euxo pipefail
          curl -sSLo gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP/gradle"
          echo "$RUNNER_TEMP/gradle/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-native-kotlin-${{ runner.os }}-${{ hashFiles('android_app/**/*.gradle') }}
          restore-keys: |
            gradle-native-kotlin-${{ runner.os }}-

      - name: Stage xray binary for Android native runtime
        run: |
          set -euxo pipefail
          mkdir -p android_app/app/src/main/jniLibs/arm64-v8a
          curl -L --fail --retry 3 -o "$RUNNER_TEMP/xray-android-arm64.zip" \
            https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64-v8a.zip
          rm -rf "$RUNNER_TEMP/xray-android-arm64"
          mkdir -p "$RUNNER_TEMP/xray-android-arm64"
          unzip -q "$RUNNER_TEMP/xray-android-arm64.zip" -d "$RUNNER_TEMP/xray-android-arm64"
          XRAY_BIN=$(find "$RUNNER_TEMP/xray-android-arm64" -type f -name xray | head -n 1)
          test -n "$XRAY_BIN"
          cp "$XRAY_BIN" android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          chmod 755 android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          test -s android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          ls -lh android_app/app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Verify native runtime inputs
        run: |
          set -euxo pipefail
          test -s registry/sources.json
          test -s android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          ls -lh android_app/app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle -p android_app :app:assembleDebug --stacktrace 2>&1 | tee android-gradle-build.log

      - name: Verify APK contains native runtime payloads
        run: |
          set -euo pipefail
          APK=$(ls -1 android_app/app/build/outputs/apk/debug/*.apk | head -n 1)
          unzip -Z1 "$APK" > apk-files.txt
          grep -Fxq "assets/sources.json" apk-files.txt
          grep -Fxq "lib/arm64-v8a/libxray.so" apk-files.txt
          if grep -qi "chaquopy" apk-files.txt; then
            echo "APK still contains Chaquopy payload files"
            exit 1
          fi
          echo "Native payload verification passed"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-failure-logs
          path: |
            android-gradle-build.log
            apk-files.txt
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-finder-native-debug-apk
          path: android_app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
