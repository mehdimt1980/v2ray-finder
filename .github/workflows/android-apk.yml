name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "main.py"
      - "buildozer.spec"
      - "v2ray_finder/**"
      - ".github/workflows/android-apk.yml"
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libltdl-dev \
            libssl-dev \
            libtool \
            openjdk-17-jdk \
            pkg-config \
            python3-pip \
            python3-setuptools \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install "cython<3.0" buildozer
          buildozer --version
          python -m pip freeze | grep -E "buildozer|Cython|python-for-android" || true

      - name: Cache Gradle only
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Create Android staging project
        run: |
          rm -rf android_build
          mkdir -p android_build
          cp main.py android_build/main.py
          cp buildozer.spec android_build/buildozer.spec
          cp -R v2ray_finder android_build/v2ray_finder
          cp README.md LICENSE NOTICE pyproject.toml android_build/ 2>/dev/null || true
          find android_build -type d -name __pycache__ -prune -exec rm -rf {} +
          python - <<'PY'
          from pathlib import Path
          root = Path('android_build')
          required = [root / 'main.py', root / 'v2ray_finder/__init__.py', root / 'v2ray_finder/pipeline.py']
          missing = [str(p) for p in required if not p.exists()]
          if missing:
              raise SystemExit('Missing staged source files: ' + ', '.join(missing))
          package_files = sorted(str(p.relative_to(root)) for p in (root / 'v2ray_finder').rglob('*.py'))
          print('Android staging package files:', len(package_files))
          print('\n'.join(package_files[:50]))
          PY

      - name: Clean stale Buildozer state
        run: |
          rm -rf android_build/.buildozer
          rm -rf ~/.buildozer/android/platform/build-*

      - name: Build debug APK
        working-directory: android_build
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee ../buildozer-build.log

      - name: Verify APK contains root package
        run: |
          APK=$(ls -1 android_build/bin/*.apk | head -n 1)
          python - <<'PY'
          import io
          import tarfile
          import zipfile
          from pathlib import Path

          apk = Path(next(Path('android_build/bin').glob('*.apk')))
          with zipfile.ZipFile(apk) as zf:
              private = zf.read('assets/private.tar')
          with tarfile.open(fileobj=io.BytesIO(private), mode='r:*') as tf:
              names = sorted(m.name.lstrip('./') for m in tf.getmembers())
          Path('private-files.txt').write_text('\n'.join(names) + '\n', encoding='utf-8')
          required = {'main.pyc', 'v2ray_finder/__init__.pyc', 'v2ray_finder/pipeline.pyc'}
          missing = sorted(required - set(names))
          print('APK private.tar file count:', len(names))
          print('\n'.join(names[:120]))
          if missing:
              raise SystemExit('APK is missing required packaged files: ' + ', '.join(missing))
          PY

      - name: Upload Buildozer logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-failure-logs
          path: |
            buildozer-build.log
            private-files.txt
            android_build/.buildozer/**/*.log
            android_build/.buildozer/android/platform/**/*.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-finder-debug-apk
          path: android_build/bin/*.apk
          if-no-files-found: error
