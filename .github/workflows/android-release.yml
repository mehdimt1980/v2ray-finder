name: Build Signed Android Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Release version name, for example 1.0.10"
        required: true
        default: "1.0.10"
      create_github_release:
        description: "Create a GitHub Release and upload the signed APK"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
permissions:
  contents: write

jobs:
  build-signed-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Expose python3.11 command
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/python-bin"
          ln -sf "$(command -v python)" "$RUNNER_TEMP/python-bin/python3.11"
          echo "$RUNNER_TEMP/python-bin" >> "$GITHUB_PATH"
          python --version
          "$RUNNER_TEMP/python-bin/python3.11" --version

      - name: Set up Gradle 8.9
        run: |
          set -euxo pipefail
          curl -sSLo gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP/gradle"
          echo "$RUNNER_TEMP/gradle/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Check signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Create the required secrets in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/v2ray-finder-release.jks"
          test -s "$RUNNER_TEMP/v2ray-finder-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/v2ray-finder-release.jks" >> "$GITHUB_ENV"

      - name: Stage Python package and registry for Chaquopy
        run: |
          rm -rf android_app/app/src/main/python/v2ray_finder
          rm -rf android_app/app/src/main/python/registry
          cp -R v2ray_finder android_app/app/src/main/python/v2ray_finder
          cp -R registry android_app/app/src/main/python/registry
          find android_app/app/src/main/python -type d -name __pycache__ -prune -exec rm -rf {} +
          python3.11 - <<'PY'
          from pathlib import Path
          root = Path('android_app/app/src/main/python')
          required = [
              root / 'android_bridge.py',
              root / 'v2ray_finder/__init__.py',
              root / 'v2ray_finder/pipeline.py',
              root / 'v2ray_finder/remote_source_registry.py',
              root / 'registry/sources.json',
          ]
          missing = [str(p) for p in required if not p.exists()]
          if missing:
              raise SystemExit('Missing Python files for Android: ' + ', '.join(missing))
          print('Python files staged for release:', len(list(root.rglob('*.py'))))
          print('Registry files staged for release:', len(list((root / 'registry').glob('*.json'))))
          PY

      - name: Bundle xray binary for Android real checks
        env:
          XRAY_ANDROID_TARGET: android_app/app/src/main/assets/xray/arm64-v8a/xray
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          python3.11 scripts/prepare_android_xray_asset.py
          test -s android_app/app/src/main/assets/xray/arm64-v8a/xray
          ls -lh android_app/app/src/main/assets/xray/arm64-v8a/xray

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -o pipefail
          gradle -p android_app :app:assembleRelease --stacktrace 2>&1 | tee android-release-build.log

      - name: Locate, verify payload, and rename APK
        run: |
          set -euo pipefail
          APK=$(ls -1 android_app/app/build/outputs/apk/release/*.apk | head -n 1)
          python3.11 - <<'PY'
          import zipfile
          from pathlib import Path
          apk = Path(next(Path('android_app/app/build/outputs/apk/release').glob('*.apk')))
          with zipfile.ZipFile(apk) as zf:
              names = set(zf.namelist())
          required = {
              'assets/chaquopy/app.imy',
              'assets/chaquopy/bootstrap.imy',
              'assets/chaquopy/requirements-common.imy',
              'assets/xray/arm64-v8a/xray',
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit('Release APK is missing required payload files: ' + ', '.join(missing))
          print('Release APK payload verified: Chaquopy + xray asset present.')
          PY
          OUT="v2ray-finder-android-${{ github.event.inputs.version_name }}-signed.apk"
          cp "$APK" "$OUT"
          echo "SIGNED_APK=$OUT" >> "$GITHUB_ENV"
          ls -lh "$OUT"

      - name: Verify APK signature
        run: |
          set -euxo pipefail
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$SIGNED_APK" | tee apk-signature.txt

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-finder-signed-release-apk
          path: |
            ${{ env.SIGNED_APK }}
            apk-signature.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event.inputs.create_github_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.event.inputs.version_name }}
          name: V2Ray Finder Android v${{ github.event.inputs.version_name }}
          body: |
            Signed Android release APK for V2Ray Finder.

            Features:
            - Persian / RTL native Android UI
            - Real v2ray_finder Pipeline through Chaquopy
            - Remote Source Registry: source updates can be pulled from GitHub without reinstalling the APK
            - TCP health check enabled by default
            - optional Real Validation v2 with bundled xray
            - protocol filter, search, pagination, stop button
            - ranked config cards
            - copy all or single configs

            Note: remote registry falls back safely to the bundled registry when GitHub is unavailable.
          files: ${{ env.SIGNED_APK }}

      - name: Upload release build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-failure-logs
          path: |
            android-release-build.log
            apk-signature.txt
          if-no-files-found: ignore
