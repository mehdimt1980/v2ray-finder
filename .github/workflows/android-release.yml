name: Build Signed Android Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Release version name, for example 1.0.10"
        required: true
        default: "1.0.10"
      create_github_release:
        description: "Create a GitHub Release and upload the signed APK"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
permissions:
  contents: write

jobs:
  build-signed-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        run: |
          set -euxo pipefail
          curl -sSLo gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP/gradle"
          echo "$RUNNER_TEMP/gradle/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Check signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Create the required secrets in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/v2ray-finder-release.jks"
          test -s "$RUNNER_TEMP/v2ray-finder-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/v2ray-finder-release.jks" >> "$GITHUB_ENV"

      - name: Stage xray binary for Android native runtime
        run: |
          set -euxo pipefail
          mkdir -p android_app/app/src/main/jniLibs/arm64-v8a
          curl -L --fail --retry 3 -o "$RUNNER_TEMP/xray-android-arm64.zip" \
            https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64-v8a.zip
          rm -rf "$RUNNER_TEMP/xray-android-arm64"
          mkdir -p "$RUNNER_TEMP/xray-android-arm64"
          unzip -q "$RUNNER_TEMP/xray-android-arm64.zip" -d "$RUNNER_TEMP/xray-android-arm64"
          XRAY_BIN=$(find "$RUNNER_TEMP/xray-android-arm64" -type f -name xray | head -n 1)
          test -n "$XRAY_BIN"
          cp "$XRAY_BIN" android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          chmod 755 android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          test -s android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          ls -lh android_app/app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Verify native runtime inputs
        run: |
          set -euxo pipefail
          test -s registry/sources.json
          test -s android_app/app/src/main/jniLibs/arm64-v8a/libxray.so
          ls -lh android_app/app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -o pipefail
          gradle -p android_app :app:assembleRelease --stacktrace 2>&1 | tee android-release-build.log

      - name: Locate, verify native payloads, and rename APK
        run: |
          set -euo pipefail
          APK=$(ls -1 android_app/app/build/outputs/apk/release/*.apk | head -n 1)
          unzip -Z1 "$APK" > apk-files.txt
          grep -Fxq "assets/sources.json" apk-files.txt
          grep -Fxq "lib/arm64-v8a/libxray.so" apk-files.txt
          if grep -qi "chaquopy" apk-files.txt; then
            echo "Release APK still contains Chaquopy payload files"
            exit 1
          fi
          OUT="v2ray-finder-android-${{ github.event.inputs.version_name }}-signed.apk"
          cp "$APK" "$OUT"
          echo "SIGNED_APK=$OUT" >> "$GITHUB_ENV"
          ls -lh "$OUT"

      - name: Verify APK signature
        run: |
          set -euxo pipefail
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$SIGNED_APK" | tee apk-signature.txt

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-finder-signed-release-apk
          path: |
            ${{ env.SIGNED_APK }}
            apk-signature.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event.inputs.create_github_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.event.inputs.version_name }}
          name: V2Ray Finder Android v${{ github.event.inputs.version_name }}
          body: |
            Signed Android release APK for V2Ray Finder.

            Features:
            - Native Kotlin Android runtime
            - Bundled trusted source registry
            - Native source fetch, config extraction, deduplication, TCP health check and scoring
            - Bundled xray native validation
            - No Chaquopy/Python runtime payload in the APK
          files: ${{ env.SIGNED_APK }}

      - name: Upload release build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-failure-logs
          path: |
            android-release-build.log
            apk-files.txt
            apk-signature.txt
          if-no-files-found: ignore
